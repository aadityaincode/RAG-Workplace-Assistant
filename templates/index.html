<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Workplace Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 2rem;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: #f1f5f9;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
        }

        #queryText {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 2px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #queryText::placeholder {
            color: #64748b;
        }

        #queryText:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            padding: 1rem 2.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .response-section, .sources-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #334155;
        }

        .section-header h2 {
            font-size: 1.3rem;
            color: #e2e8f0;
        }

        .icon {
            width: 24px;
            height: 24px;
            color: #60a5fa;
        }

        .response-content {
            color: #e2e8f0;
            line-height: 1.8;
            font-size: 1rem;
        }

        .placeholder {
            color: #64748b;
            text-align: center;
            padding: 3rem 1rem;
            font-style: italic;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #60a5fa;
            padding: 2rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .source-card {
            background: #334155;
            border-left: 4px solid #3b82f6;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .source-card:hover {
            transform: translateX(5px);
            background: #475569;
        }

        .source-card:last-child {
            margin-bottom: 0;
        }

        .source-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .source-text {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        @media (max-width: 968px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2rem;
            }

            .search-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Workplace Assistant</h1>
            <p>Ask questions about your workplace documents and policies</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="queryText" 
                    placeholder="Ask me anything about workplace policies, projects, or guidelines..."
                    onkeypress="if(event.key === 'Enter') search()"
                >
                <button id="searchBtn" onclick="search()">
                    <span id="btnText">Search</span>
                </button>
            </div>
        </div>

        <div class="content-grid">
            <div class="response-section">
                <div class="section-header">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                    <h2>Response</h2>
                </div>
                <div id="response" class="response-content">
                    <div class="placeholder">
                        Your answer will appear here. Try asking about vacation policies, project details, or IT guidelines!
                    </div>
                </div>
            </div>

            <div class="sources-section">
                <div class="section-header">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <h2>Source Documents</h2>
                </div>
                <div id="sources">
                    <div class="placeholder">
                        Retrieved documents will appear here
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function search() {
            const queryText = document.getElementById('queryText').value.trim();
            const responseDiv = document.getElementById('response');
            const sourcesDiv = document.getElementById('sources');
            const searchBtn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');

            if (!queryText) {
                responseDiv.innerHTML = '<div class="placeholder" style="color: #ef4444;">Please enter a question</div>';
                return;
            }

            // Show loading state
            searchBtn.disabled = true;
            btnText.textContent = 'Searching...';
            responseDiv.innerHTML = '<div class="loading"><div class="spinner"></div><span>Thinking...</span></div>';
            sourcesDiv.innerHTML = '<div class="loading"><div class="spinner"></div><span>Finding sources...</span></div>';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryText })
                });

                if (!response.ok) {
                    throw new Error('Search request failed');
                }

                const result = await response.json();

                // Display generated answer
                responseDiv.innerHTML = `<p>${result.generated_answer}</p>`;

                // Display source documents
                if (result.retrieved_documents && result.retrieved_documents.length > 0) {
                    sourcesDiv.innerHTML = result.retrieved_documents
                        .map((doc, index) => `
                            <div class="source-card">
                                <div class="source-label">Source ${index + 1}</div>
                                <div class="source-text">${doc}</div>
                            </div>
                        `)
                        .join('');
                } else {
                    sourcesDiv.innerHTML = '<div class="placeholder">No sources found</div>';
                }

            } catch (error) {
                responseDiv.innerHTML = `<div class="placeholder" style="color: #ef4444;">Error: ${error.message}</div>`;
                sourcesDiv.innerHTML = '<div class="placeholder">Unable to retrieve sources</div>';
            } finally {
                searchBtn.disabled = false;
                btnText.textContent = 'Search';
            }
        }

        // Focus on input on page load
        document.getElementById('queryText').focus();
    </script>
</body>
</html>
