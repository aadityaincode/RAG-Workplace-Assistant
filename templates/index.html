<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Workshop Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: #f6f8fa;
            color: #24292e;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1, h2 {
            border-bottom: 1px solid #e1e4e8;
            padding-bottom: 0.5rem;
        }
        input, button {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            border: 1px solid #d1d5da;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #2ea44f;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #2c974b;
        }
        .response {
            background-color: #fff;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #d1d5da;
            white-space: pre-wrap;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RAG Workshop Demo</h1>

        <h2>1. Ask a Question</h2>
        <input type="text" id="queryText" placeholder="Ask a question (e.g., 'How many vacation days do I get?')...">
        <button onclick="search()">Search</button>

        <h2>Response</h2>
        <div id="response" class="response">
            Your results will appear here...
        </div>
    </div>

    <script>
        async function search() {
            const queryText = document.getElementById('queryText').value;
            const responseDiv = document.getElementById('response');

            if (!queryText) {
                responseDiv.textContent = 'Please enter a query.';
                return;
            }

            responseDiv.textContent = 'Searching...';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryText })
                });
                const result = await response.json();
                responseDiv.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
